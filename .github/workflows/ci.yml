name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hello

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ EXISTING - kept as is
      - name: Build frontend image
        run: docker build -t hello-frontend ./frontend

      - name: Build backend image
        run: docker build -t hello-backend ./backend

      - name: Run docker compose
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Check backend is healthy
        run: curl -f http://localhost:5000/message || echo "Backend not ready yet"

      - name: Tear down
        run: docker compose down

  # 🆕 NEW JOB - only runs on push to main, not on PRs
  push-and-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🆕 Login to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🆕 Build and push both images
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hello-frontend:latest
            ghcr.io/${{ github.repository_owner }}/hello-frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hello-backend:latest
            ghcr.io/${{ github.repository_owner }}/hello-backend:${{ github.sha }}

      # 🆕 Deploy to Kubernetes
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags in manifests
        run: |
          sed -i "s|hello-frontend:latest|hello-frontend:${{ github.sha }}|g" k8s/frontend.yaml
          sed -i "s|hello-backend:latest|hello-backend:${{ github.sha }}|g" k8s/backend.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend
