name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -t hello-frontend ./frontend

      - name: Build backend image
        run: docker build -t hello-backend ./backend

      - name: Run docker compose
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Check backend is healthy
        run: curl -f http://localhost:5000/message || echo "Backend not ready yet"

      - name: Tear down
        run: docker compose down
